{% extends "base.html" %}
{% set active = "movimentacoes" %}
{% block title %}Registrar movimentação — Estoque{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/movimentacoes" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Movimentações</a>
  <span class="text-slate-700">/</span>
  <h1 class="text-2xl font-bold text-white">Registrar movimentação</h1>
</div>

<div class="bg-slate-900 rounded-xl border border-slate-800 p-6 max-w-xl">
  <form method="post" action="/movimentacoes/nova" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-slate-400 mb-1">Produto *</label>
      <select name="produto_id" required
              class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        <option value="">— Selecione —</option>
        {% for prod in produtos %}
        <option value="{{ prod.id }}"
                {% if produto_id_selecionado == prod.id %}selected{% endif %}>
          {{ prod.nome }} (estoque: {{ prod.quantidade }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Tipo *</label>
        <select name="tipo" required
                class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
          <option value="ENTRADA">Entrada</option>
          <option value="SAIDA">Saída</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Quantidade *</label>
        <input type="number" name="quantidade" required min="1" value="1"
               class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-400 mb-1">Motivo</label>
      <input type="text" name="motivo" placeholder="Ex: Compra, Venda, Devolução, Ajuste…"
             class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 placeholder-slate-600" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-400 mb-1">Observação</label>
      <textarea name="observacao" rows="2"
                class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 placeholder-slate-600"></textarea>
    </div>

    <div class="flex items-center gap-3 pt-2 border-t border-slate-800">
      <button type="submit"
              class="bg-teal-500 hover:bg-teal-400 text-slate-950 text-sm font-semibold px-6 py-2 rounded-lg transition-colors">
        Registrar
      </button>
      <a href="/movimentacoes" class="text-sm text-slate-500 hover:text-slate-300 transition-colors">Cancelar</a>
    </div>

  </form>
</div>
{% endblock %}

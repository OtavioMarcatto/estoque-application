{% extends "base.html" %}
{% set active = "movimentacoes" %}
{% block title %}Registrar movimentação — Estoque{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/movimentacoes" class="text-gray-400 hover:text-gray-600 text-sm">← Movimentações</a>
  <h1 class="text-2xl font-bold text-gray-800">Registrar movimentação</h1>
</div>

<div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 max-w-xl">
  <form method="post" action="/movimentacoes/nova" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Produto *</label>
      <select name="produto_id" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">— Selecione —</option>
        {% for prod in produtos %}
        <option value="{{ prod.id }}"
                {% if produto_id_selecionado == prod.id %}selected{% endif %}>
          {{ prod.nome }} (estoque: {{ prod.quantidade }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo *</label>
        <select name="tipo" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="ENTRADA">Entrada</option>
          <option value="SAIDA">Saída</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade *</label>
        <input type="number" name="quantidade" required min="1" value="1"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Motivo</label>
      <input type="text" name="motivo" placeholder="Ex: Compra, Venda, Devolução, Ajuste…"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Observação</label>
      <textarea name="observacao" rows="2"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors">
        Registrar
      </button>
      <a href="/movimentacoes" class="text-sm text-gray-500 hover:text-gray-700">Cancelar</a>
    </div>

  </form>
</div>
{% endblock %}
